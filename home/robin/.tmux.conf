# To reload:
# :source-file ~/.tmux.conf or Mod+R
bind-key R source-file ~/.tmux.conf

setw -g mode-keys vi # vim keybindings

set-option -g default-terminal screen-256color
bind-key space next-window
bind-key bspace previous-window
bind-key enter next-layout

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start window numbering at 1 and automatically renumber after closing a window.
set -g base-index 1
set-option -g renumber-windows on
setw -g pane-base-index 1

# Open new windows in the current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# vim-like screen moving and splitting
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# appearance
set -g status-left-length 40  # Increase session name length
set -g status-right-length 60  # Increase session name length
set -g status-position bottom  # default
set -g status-right '[#{host}] | %Y-%m-%d | %H:%M:%S'
